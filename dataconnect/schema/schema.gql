type User @table {
  displayName: String!
  email: String!
  userType: String!
  createdAt: Timestamp!
  photoUrl: String
  bio: String
  organizationName: String
}

type Skill @table {
  name: String!
}

type VolunteerOpportunity @table {
  title: String!
  description: String!
  date: Date!
  location: String!
  createdAt: Timestamp!
  startTime: String
  endTime: String
  numVolunteersNeeded: Int
  organization: User
}

type OpportunitySkill @table(key: ["opportunity", "skill"]) {
  opportunity: VolunteerOpportunity!
  skill: Skill!
}

type VolunteerAssignment @table {
  assignedAt: Timestamp!
  status: String
  hoursLogged: Float
  volunteer: User
  opportunity: VolunteerOpportunity
}